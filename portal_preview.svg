<svg width="800" height="400" viewBox="0 0 800 400" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="800" height="400" fill="#0a0a0a" rx="10" />
  
  <!-- Header -->
  <rect width="800" height="60" fill="#1a1a1a" />
  <line x1="0" y1="60" x2="800" y2="60" stroke="#ff0033" stroke-width="2" />
  
  <!-- Logo -->
  <circle cx="40" cy="30" r="15" fill="none" stroke="#ff0033" stroke-width="2" />
  <path d="M40 15 L40 45 M25 30 L55 30" stroke="#ff0033" stroke-width="2" />
  
  <!-- Title -->
  <text x="70" y="30" font-family="monospace" font-size="18" fill="#ff0033" font-weight="bold">CORUSCANT CENTRAL BANK</text>
  <text x="70" y="45" font-family="monospace" font-size="10" fill="#b0b0b0">WERO INTEGRATION TERMINAL v4.2.7</text>
  
  <!-- Toggles -->
  <rect x="550" y="20" width="230" height="25" rx="12" fill="#000" stroke="#00f2ff" />
  <text x="560" y="37" font-family="monospace" font-size="9" fill="#00f2ff">LOCAL OPERATIVE | IMPERIAL OFFICER</text>
  
  <!-- Main Content Area -->
  <rect x="50" y="90" width="700" height="250" fill="#1a1a1a" rx="5" />
  <line x1="50" y1="90" x2="50" y2="340" stroke="#00f2ff" stroke-width="4" />
  
  <!-- Directive Title -->
  <text x="70" y="120" font-family="monospace" font-size="14" fill="#00f2ff" font-weight="bold">DIRECTIVE 2: THE HYPERDRIVE (AUTOMATION)</text>
  
  <!-- Terminal -->
  <rect x="70" y="140" width="660" height="60" fill="#000" rx="5" />
  <text x="85" y="175" font-family="monospace" font-size="12" fill="#00ff00">gemini /wero-send 500.00 DE123456...</text>
  <rect x="670" y="150" width="50" height="20" fill="#00f2ff" rx="3" />
  <text x="678" y="163" font-family="monospace" font-size="8" fill="#000">COPY</text>
  
  <!-- Intelligence Report -->
  <rect x="70" y="215" width="660" height="80" fill="rgba(0, 242, 255, 0.1)" stroke-left="2" />
  <line x1="70" y1="215" x2="70" y2="295" stroke="#00f2ff" stroke-width="2" />
  <text x="85" y="235" font-family="monospace" font-size="11" fill="#fff" font-weight="bold">INTELLIGENCE REPORT:</text>
  <text x="85" y="255" font-family="monospace" font-size="10" fill="#00f2ff">Custom commands wrap complex prompts into reusable aliases.</text>
  <text x="85" y="270" font-family="monospace" font-size="10" fill="#00f2ff">The {{...}} syntax defines arguments for banking transactions.</text>
  
  <!-- Footer -->
  <text x="400" y="380" font-family="monospace" font-size="10" fill="#444" text-anchor="middle">PROPERTY OF THE CORUSCANT CENTRAL BANK</text>
  
  <!-- Scanlines overlay -->
  <pattern id="scanlines" width="100%" height="4" patternUnits="userSpaceOnUse">
    <line x1="0" y1="0" x2="100%" y2="0" stroke="rgba(0,0,0,0.1)" stroke-width="2" />
  </pattern>
  <rect width="800" height="400" fill="url(#scanlines)" pointer-events="none" />
</svg>
